name: Refactor
description: リファクタリング
title: "[Refactor] "
labels: ["refactor"]

body:
  - type: dropdown
    id: priority
    attributes:
      label: 優先度
      default: 3
      options:
        - 高
        - 中
        - 低
        - 未定
    validations:
      required: true

  - type: textarea
    id: summary
    attributes:
      label: 概要
      description: リファクタリングの対象と内容を簡潔に記載してください
    validations:
      required: true

  - type: textarea
    id: background
    attributes:
      label: 背景
      description: なぜリファクタリングが必要なのかを記載してください
    validations:
      required: true

  - type: textarea
    id: flow
    attributes:
      label: 実装フロー
      value: |
        - [ ]
        - [ ]
        - [ ]

  - type: textarea
    id: references
    attributes:
      label: 参考URL
      description: 参考になる資料やリンクがあれば記載してください（任意）

  - type: textarea
    id: done
    attributes:
      label: 完了条件
      value: |
        - [ ] 挙動が変わっていない
        - [ ] テストが通過している
        - [ ] レビューが完了している
    validations:
      required: true
